version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kuala_Lumpur
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Only update patch/minor for dev dependencies — major bumps need manual review
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      - dependency-name: fast-check
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: Asia/Kuala_Lumpur
    commit-message:
      prefix: "chore(ci)"
